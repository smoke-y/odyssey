<head>
    <link rel="stylesheet" href="/createPlan.css"/>
    <link href="/leaflet/leaflet.css" rel="stylesheet">
    <link href="/leaflet/leaflet-routing-machine.css" rel="stylesheet">
    <script src="/leaflet/leaflet.js"></script>
    <script src="/leaflet/leaflet-routing-machine.js"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://code.jquery.com/ui/1.12.1/jquery-ui.min.js"></script>
</head>

<body>
    <div id="map"></div>

    <div id="mapRight">
        <h2>Add Marker</h2>
        <form id="markerForm">
            <div class="formRow">
                <div class="formGroup">
                    <label>Lat&Long*</label>
                    <input type="text" step="any" id="latlong" required>
                </div>
                <div class="formGroup">
                    <label>Name*</label>
                    <input type="text" id="name" required>
                </div>
            </div>
            <div class="formRow">
                <div class="formGroup">
                    <label>Type*</label>
                    <select id="type">
                        <option value="tour">tour</option>
                        <option value="stay">stay</option>
                    </select>
                </div>
                <div class="formGroup">
                    <label>Date Of Arrival</label>
                    <input type="date" id="doa">
                </div>
            </div>
            <div class="formRow">
                <div class="formGroup">
                    <label>Expected Expenditure</label>
                    <input type="number" id="ee">
                </div>
                <div class="formGroup">
                    <label>Add route*</label>
                    <select id="shouldRoute">
                        <option value="yes">yes</option>
                        <option value="no">no</option>
                    </select>
                </div>
            </div>
            <div class="formRow">
                <div class="formGroup">
                    <label>Note</label>
                    <input type="text" id="note">
                </div>
            </div>
            <button class="lngBluBtn" type="submit">Add Marker</button>
            <button class="lngBluBtn" type="button" onclick="resetForm()">Clear Form To Add New Marker</button>
        </form>
        <h2>Stats</h2>
        <p id="stats"></p>
        <h2>Markers</h2>
        <ul id="markerList" class="sortable"></ul>
        <button class="lngBluBtn" id="saveMarkersBtn">Save Plan</button>
        <div id="saveStatus"></div>
    </div>

    <script src="/createPlan.js"></script>
</body>
