<head>
    <title>Odyssey</title>
    <link rel="stylesheet" href="/style.css"/>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sue+Ellen+Francisco&display=swap" rel="stylesheet">
</head>

<body>
    <img src="/images/su.png" style="width:30%; height:30%"/>
    <br>
    <p>
    <form id="signup" method="POST" action="/signup">
        <div class="formGroup">
            <p>Username</p>
            <input type="text" id="username" name="username" required>
            <p>Password</p>
            <input type="password" id="password" name="password" required>
            <p>Renter Password</p>
            <input type="password" id="repassword" name="repassword" required>
        </div>
        <button type="submit" class="lngBluBtn">Sign up</button>
    </form>
    <p id="status"></p>
    </p>
    <script>
        const stat = document.getElementById("status");

        document.getElementById('signup').addEventListener('submit', async function(e) {
            e.preventDefault();
            stat.textContent = "";
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const repassword = document.getElementById('repassword').value;

            if (password !== repassword) {
                e.preventDefault();
                stat.textContent = "Passwords do not match";
                document.getElementById('password').focus();
                return;
            }

            try {
                const response = await fetch('/signup', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        username: username,
                        password: password,
                        repassword: repassword
                    })
                });

                const contentType = response.headers.get('content-type');
                if (!contentType) {
                    stat.textContent = 'Server error: ' + response.status;
                    return;
                };

                if (response.ok) {
                    const data = await response.json();
                    if (data.token) {
                        localStorage.setItem('token', data.token);
                        window.location.href = '/plans';
                    } else {
                        stat.textContent = 'Signup successful but no token received :<';
                    }
                } else {
                    const data = await response.json();
                    stat.textContent = data.message;
                }
            } catch (error) {
                console.error('Error:', error);
                stat.textContent = 'Network error. Please check your connection and try again.';
            }
        });
    </script>
</body>
