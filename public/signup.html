<head>
    <title>Odyssey</title>
    <link rel="stylesheet" href="/style.css"/>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sue+Ellen+Francisco&display=swap" rel="stylesheet">
</head>

<body>
    <img src="/images/su.png" style="width:30%; height:30%"/>
    <br>
    <p>
    <form id="signup" method="POST" action="/signup">
        <div class="formGroup">
            <p>Username</p>
            <input type="text" id="usrname" name="username" required>
            <p>Password</p>
            <input type="password" id="pass" name="username" required>
            <p>Renter Password</p>
            <input type="password" id="repass" name="username" required>
        </div>
        <button type="submit" class="lngBluBtn">Sign up</button>
    </form>
    </p>
    <script>
        document.getElementById('signup').addEventListener('submit', function(e) {
            const password = document.getElementById('pass').value;
            const repassword = document.getElementById('repass').value;

            if (password !== repassword) {
                e.preventDefault();
                alert('Passwords do not match!');
                document.getElementById('pass').focus();
            }
        });
    </script>
</body>
